
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Students</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>

<h1 th:text="#{app.title}"></h1>


<hr>


<div>
    <a href="?lang=en">English</a> | <a href="?lang=ka">ქართული</a>
</div>



<!-- წარმატების მესიჯი -->
<p th:text="${success}"></p>

<!-- სტუდენტის დამატების ფორმა -->
<form th:action="@{/save}" th:object="${student}" method="post">

    <!-- name -->
    <input type="text" th:field="*{name}" th:placeholder="#{placeholder.name}">

    <!-- validation error -->
    <span th:errors="*{name}"></span>

    <br><br>

    <!-- email -->
    <input type="email" th:field="*{email}" placeholder="Email">

    <!-- validation error -->
    <span th:errors="*{email}"></span>

    <br><br>

    <button type="submit" th:text="#{btn.save}"></button>

</form>

<hr>

<!-- File Upload -->
<form method="post" enctype="multipart/form-data" action="/upload">

    <input type="file" name="file">

    <button type="submit" th:text="#{btn.upload}"></button>

</form>

<hr>

<h2 th:text="#{list.title}"></h2>

<ul>

    <!-- სტუდენტების სია -->
    <li th:each="s : ${students}">

        <span th:text="${s.name}"></span>

        <a th:href="@{'/delete/' + ${s.id}}" th:text="#{btn.delete}"></a>

    </li>

</ul>

<script src="/app.js"></script>

</body>
</html>
