spring:
  datasource:
    url: jdbc:h2:mem:testdb
  jpa:
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: true
  profiles:
    active: dev

logging:
  level:
    com.example.demo: DEBUG
  file:
    name: app.log

app:
  name: StudentSystem
  version: 1.0
  management:
    endpoints:
      web:
        exposure:
          include: health